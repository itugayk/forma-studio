server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # --- Security headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Routing (Astro directory build) ---
    # Çok sayfalı statik site: eşleşmeyen yollar 404.html'e düşer (SPA fallback değil).
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # --- Long-lived caching for fingerprinted/static assets ---
    location ~* \.(?:css|js|mjs|woff2?|ttf|otf|eot|svg|jpg|jpeg|png|webp|avif|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        try_files $uri =404;
    }

    # --- Custom error page ---
    error_page 404 /404.html;

    # Don't cache HTML so deploys are picked up immediately
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
